<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Handmade Bag</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container">

        <div class="row justify-content-center min-vh-100 align-items-center">

            <div class="col-md-6 col-lg-5">

                <div class="card shadow border-0">

                    <div class="card-body p-4">

                        <h2 class="text-center fw-bold mb-4">
                            Register
                        </h2>

                        <form>

                            <div class="mb-3">
                                <label class="form-label">
                                    Nama Lengkap
                                </label>

                                <input type="text"
                                    class="form-control">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">
                                    Email
                                </label>

                                <input type="email"
                                    class="form-control">
                            </div>

                            <div class="mb-4">
                                <label class="form-label">
                                    Password
                                </label>

                                <input type="password"
                                    class="form-control">
                            </div>

                            <a href="login.html"
                                class="btn btn-dark w-100">

                                Register
                            </a>

                        </form>

                        <p class="text-center mt-3 mb-0">

                            Sudah punya akun?

                            <a href="login.html">
                                Login
                            </a>

                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
